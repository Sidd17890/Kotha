<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotha · Prostitute booking</title>
    <!-- Google Font & Font Awesome for icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9e3e0 0%, #fee9b0 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main container */
        .container {
            max-width: 1300px;
            width: 100%;
        }

        /* header – juicy & vibrant */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #aa4e9c, #f26b4b, #faca4b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 4px 4px 10px rgba(250, 120, 100, 0.2);
        }

        .header p {
            font-size: 1.3rem;
            font-weight: 600;
            color: #b34180;
            background: #fff2d7;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            box-shadow: 0 12px 18px -8px rgba(245, 150, 100, 0.5);
            backdrop-filter: blur(2px);
            margin-top: 0.5rem;
        }

        /* doctor grid — candy colours, rounded, pop */
        .doctor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem 1.8rem;
            margin: 2.5rem 0 3rem;
        }

        /* card – vibrant glassmorphism with bounce */
        .doctor-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 42px 42px 42px 42px;
            box-shadow: 0 30px 30px -12px rgba(231, 116, 63, 0.4),
                        0 0 0 2px rgba(255, 215, 140, 0.5) inset;
            padding: 1.8rem 1.2rem 1.8rem 1.2rem;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 245, 150, 0.7);
            transform: scale(1);
        }

        .doctor-card:hover {
            transform: translateY(-16px) scale(1.02);
            box-shadow: 0 40px 30px -8px #f79f7c, 0 0 0 4px #ffe28f inset;
            background: rgba(255, 255, 250, 0.95);
        }

        /* image wrapper – vibrant gradient frame */
        .img-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fb9cba, #ffd194, #b6f0c4);
            padding: 6px;
            margin-bottom: 1.2rem;
            box-shadow: 0 14px 18px -4px #ea8d6e;
        }

        .doctor-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #ffe3d6;
            border: 3px solid white;
        }

        /* dummy placeholder for missing images — happy colorful */
        .doctor-img[src=""] {
            background: linear-gradient(130deg, #ffb88c, #f7e798);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: #b34180;
        }

        .doctor-name {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(140deg, #2c3e8f, #ba2d7e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .specialization {
            font-size: 1.2rem;
            font-weight: 600;
            background: #f6546a;
            color: white;
            padding: 0.35rem 1.4rem;
            border-radius: 40px;
            margin: 0.7rem 0 0.5rem;
            box-shadow: 0 6px 0 #b62e4c;
            display: inline-block;
            border: 1px solid #ffc857;
        }

        .price-section {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.5rem 0 1.2rem;
            background: #3b2b5c;
            background: linear-gradient(145deg, #6930a3, #e9594e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-section i {
            color: #ffaa3a;
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px #ff8a5c);
        }

        .book-btn {
            background: #ff9254;
            border: none;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            color: white;
            box-shadow: 0 10px 0 #b64526, 0 6px 22px #fca976;
            cursor: pointer;
            transition: 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #ffcd94;
            margin-top: 0.2rem;
        }

        .book-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #b64526, 0 8px 18px #ffb175;
        }

        /* modal – playful popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 140, 100, 0.2);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-card {
            background: #fffef2;
            max-width: 380px;
            width: 90%;
            border-radius: 70px 70px 50px 50px;
            padding: 2.8rem 1.8rem 2.2rem;
            box-shadow: 0 40px 40px #f06a4e80, 0 20px 0 #ffd693 inset, 0 -6px 0 #ffa174 inset;
            text-align: center;
            border: 3px solid #ffc586;
            animation: wiggle 0.3s;
        }

        @keyframes wiggle {
            0% { transform: scale(0.8) rotate(-1deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .modal-card i {
            font-size: 4rem;
            color: #ec7e5c;
            background: #fff3c9;
            padding: 1.2rem;
            border-radius: 60px;
            box-shadow: 0 8px 0 #b66b45;
            margin-bottom: 1rem;
        }

        .modal-card h2 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(145deg, #d6347c, #fe9036);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-card p {
            font-size: 1.3rem;
            font-weight: 600;
            background: #c2e9d6;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            margin: 1.4rem 0 1rem;
        }

        .close-modal {
            background: #35b0ab;
            border: none;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            padding: 0.8rem 2.2rem;
            border-radius: 40px;
            box-shadow: 0 7px 0 #1e6b66;
            cursor: pointer;
            margin-top: 0.6rem;
            transition: 0.05s linear;
        }
        .close-modal:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1e6b66;
        }

        /* footer */
        .footer-note {
            margin-top: 3.5rem;
            font-weight: 600;
            background: #fdcba0;
            padding: 0.8rem 2rem;
            border-radius: 120px;
            color: #5e3b6e;
            font-size: 1.2rem;
            box-shadow: 0 10px 0 #b87a5a;
        }

        /* fallback img handling */
        .no-image:after {
            content: "👩‍⚕️";
            font-size: 3rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✨ Bua's Kotha ✨</h1>
        <p><i class="" style="margin-right: 10px;"></i> meet • book • heal — in full colour</p>
    </div>

    <!-- doctor grid injected via JS -->
    <div id="doctorList" class="doctor-grid"></div>

    <div class="footer-note">
        <i class="fas fa-calendar-check"></i>  excite — instant booking
    </div>
</div>

<!-- confirmation modal -->
<div id="bookingModal" class="modal">
    <div class="modal-card">
        <i class="fas fa-face-smiling-hands"></i>
        <h2>✨ YAY! ✨</h2>
        <p id="modalDoctorName">Dr. Simi</p>
        <div style="font-size:1.8rem; margin:0.4rem 0">📅</div>
        <button class="close-modal" id="closeModalBtn"><i class="fas fa-check-circle"></i> done</button>
    </div>
</div>

<script>
    (function() {
        // -------------------------------------------------------------
        //  DOCTOR DATA (name, image, specialization, price)
        //  vibrant & diverse
        // -------------------------------------------------------------
        const doctors = [
            {
                name: "Anal",
                image: "shikharua.jpeg",   // female doc style
                specialization: "Blowjob 💦",
                price: 300
            },
            {
                name: "Shikhar",
                image: "shikhar.jpeg",   // male doc style
                specialization: "Rape Through Eyes",
                price: 400
            },
            {
                name: "Pussy",
                image: "shikharua2.jpeg",   // female doc
                specialization: "Licking",
                price: 200
            },
            {
                name: "Final Boss",
                image: "shikharua3.jpeg",   // male doc
                specialization: "Threesome",
                price: 300
            },
           
        ];

        // fallback colourful image if any img fails to load (or missing)
        const FALLBACK_GRADIENT = "linear-gradient(145deg, #ffccbc, #ffe0b0, #e2c3ff)";

        const doctorGrid = document.getElementById('doctorList');
        const modal = document.getElementById('bookingModal');
        const modalDoctorNameSpan = document.getElementById('modalDoctorName');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Helper: create a card with image error handling
        function createDoctorCard(doc) {
            const card = document.createElement('div');
            card.className = 'doctor-card';

            // image wrapper & img
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'img-wrapper';

            const img = document.createElement('img');
            img.alt = doc.name;
            img.className = 'doctor-img';
            // set image src
            img.src = doc.image;

            // if image fails to load, replace with colorful gradient and an emoji (via background / pseudo)
            img.onerror = function() {
                this.style.background = "radial-gradient(circle at 30% 30%, #ffc3a0, #ffb47b, #f8acbf)";
                this.style.display = 'flex';
                this.style.alignItems = 'center';
                this.style.justifyContent = 'center';
                this.style.fontSize = '3.2rem';
                this.style.color = '#9b3b6b';
                // remove broken src, set alt text as content (but we use pseudo with unicode 👩‍⚕️)
                // easier: we set inner text via extra span? but img can't have innerHTML
                // we replace with div? but keep img for consistency – i'll set data attribute and style.
                // we add a pseudo element but img doesn't support ::before. we replace with background + text-indent?
                // Let's use a simple fallback: replace image with a div-like background but keep <img> using unicode.
                // But img can't show unicode. We change it to a div?  no, structure is fixed.
                // Better: Use a background and hide the broken icon, then insert a span? I'll keep it clean:
                // we set the src to a data URI with svg that shows text? but that's complex.
                // For simplicity, we keep background gradient and set font-size 0, but then no symbol.
                // we add a pseudo element on wrapper? We'll make wrapper ::before show icon if img fails.
                // I'll make a more robust fallback: on error, hide img and use wrapper's pseudo.
                this.style.opacity = '0';  // hide broken img
                // add a pseudo element via wrapper class
                imgWrapper.classList.add('img-fallback');
                // set text on wrapper after
                const fallbackSpan = document.createElement('span');
                fallbackSpan.className = 'fallback-emoji';
                fallbackSpan.innerText = '';
                fallbackSpan.style.position = 'absolute';
                fallbackSpan.style.fontSize = '3.8rem';
                fallbackSpan.style.top = '50%';
                fallbackSpan.style.left = '50%';
                fallbackSpan.style.transform = 'translate(-50%, -50%)';
                fallbackSpan.style.color = '#a13e6f';
                imgWrapper.style.position = 'relative';
                imgWrapper.style.background = 'radial-gradient(circle at 30% 30%, #ffe5b4, #fdc7b4)';
                imgWrapper.appendChild(fallbackSpan);
            };

            imgWrapper.appendChild(img);

            // name
            const nameEl = document.createElement('div');
            nameEl.className = 'doctor-name';
            nameEl.textContent = doc.name;

            // specialization badge
            const specEl = document.createElement('div');
            specEl.className = 'specialization';
            specEl.textContent = doc.specialization;

            // price
            const priceEl = document.createElement('div');
            priceEl.className = 'price-section';
            priceEl.innerHTML = `<i class="fas fa-coins"></i> ₹${doc.price} <span style="font-size:1.1rem; color:#f0725e;">/ visit</span>`;

            // book button
            const bookBtn = document.createElement('button');
            bookBtn.className = 'book-btn';
            bookBtn.innerHTML = '<i class="fas fa-calendar-plus"></i> book now';
            // store doctor name and price in dataset
            bookBtn.dataset.doctorName = doc.name;
            bookBtn.dataset.doctorPrice = doc.price;

            // attach click event to open modal
            bookBtn.addEventListener('click', function(e) {
                const name = this.dataset.doctorName;
                modalDoctorNameSpan.innerHTML = `${name} <span style="display:block; font-size:1.3rem; background:#ffd966; border-radius:30px; margin-top:6px; padding:2px;"> booked 💖</span>`;
                modal.style.display = 'flex';
            });

            // assemble card
            card.appendChild(imgWrapper);
            card.appendChild(nameEl);
            card.appendChild(specEl);
            card.appendChild(priceEl);
            card.appendChild(bookBtn);

            return card;
        }

        // render all doctors
        doctors.forEach(doc => {
            const card = createDoctorCard(doc);
            doctorGrid.appendChild(card);
        });

        // handle modal close
        function closeModal() {
            modal.style.display = 'none';
        }

        closeModalBtn.addEventListener('click', closeModal);

        // click outside modal closes it
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // add a small dynamic effect: show random colour confetti? no, but keep it simple.
        // optionally simulate that we have images even if they fail – we have fallback.
        // Pre-emptive fallback for any missing image: if image loading fails we already handle in onerror.
        // But images from placeholder may return 404. We'll add a default placeholder for all
        // (i used random unsplash but they may block? replaced with imgur style placeholders (creative) – anyway we handle error.
        // i'm adding extra style for fallback
        const style = document.createElement('style');
        style.innerHTML = `
            .img-wrapper.img-fallback {
                background: radial-gradient(circle at 30% 30%, #ffb990, #ffd5aa, #f2bcff) !important;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .fallback-emoji {
                font-size: 3.5rem;
                z-index: 2;
            }
            .img-wrapper {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }
        `;
        document.head.appendChild(style);
    })();
</script>
<!-- small style adjustment for fallback emoji inside wrapper (inline script already adds fallback) -->
</body>
</html>
